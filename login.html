<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Access | Bambika Casino</title>
    <!-- Core Application Design Tokens & Layer Specific Formatting -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <div class="auth-viewport-wrapper">
        <div class="auth-form-shield">
            
            <div class="auth-brand-logo">BAMBIKA<span>.</span></div>
            <div class="auth-view-subtitle">Enter your terminal access credentials</div>

            <!-- Client Action Feedback Interceptor Drawer -->
            <div class="auth-error-feedback" id="authFailurePanel"></div>

            <form id="loginTransactionForm">
                <div class="form-group">
                    <label for="loginUsername">Account Username</label>
                    <input type="text" id="loginUsername" class="form-input" autocomplete="username" required placeholder="e.g. Nyeri_King">
                </div>

                <div class="form-group">
                    <label for="loginPassword">Access Password</label>
                    <input type="password" id="loginPassword" class="form-input" autocomplete="current-password" required placeholder="••••••••">
                </div>

                <button type="submit" class="auth-submit-action" id="loginSubmitBtn">INITIALIZE SESSION</button>
            </form>

            <div class="auth-navigation-footer">
                New to the platform? <a href="register.html">Create an Account</a>
            </div>

        </div>
    </div>

    <!-- Core Runtime Pipeline Engine Scripts -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginTransactionForm');
            const feedbackPanel = document.getElementById('authFailurePanel');

            if (window.AuthEngine && window.AuthEngine.isAuthenticated()) {
                window.location.href = 'dashboard.html';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                feedbackPanel.style.display = 'none';

                const username = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;

                try {
                    // Route payload directly into auth layer framework
                    const success = await window.AuthEngine.login(username, password);
                    if (success) {
                        window.location.href = 'dashboard.html';
                    }
                } catch (error) {
                    feedbackPanel.textContent = error.message || "Credential verification rejection.";
                    feedbackPanel.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
